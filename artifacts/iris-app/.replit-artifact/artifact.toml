kind = "web"
previewPath = "/"
title = "Iris - Email & Calendar AI"
version = "1.0.0"
id = "artifacts/iris-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21465
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/iris-app run dev"

[services.env]
PORT = "21465"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/iris-app", "run", "build"]
publicDir = "artifacts/iris-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
